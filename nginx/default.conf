server {
    listen 80;
    server_name dev-api.fittheman.site;

    location /.well-known/acme-challenge/ {
        allow all;
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name dev-api.fittheman.site;

    ssl_certificate /etc/letsencrypt/live/dev-api.fittheman.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev-api.fittheman.site/privkey.pem;

    location / {
        proxy_pass http://fittheman-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}