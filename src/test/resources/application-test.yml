spring:
  config:
    activate:
      on-profile: "test"

  datasource:
    url: jdbc:h2:mem:testDb;MODE=POSTGRESQL

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties :
      hibernate:
        format_sql: true
        default_batch_fetch_size: 1000