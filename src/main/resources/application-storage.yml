spring:
  config:
    activate:
      on-profile: "storage"

aws:
  s3:
    bucket-name: ${S3_BUCKET_NAME}
    region: ${AWS_REGION}
    default:
      user: "users/default-image.jpg"
      post: "posts/default-image.jpg"
      product: "products/default-image.jpg"
    path:
      user: "users"
      post: "posts"
      product: "products"
  sts:
    role-arn: ${AWS_ROLE_ARN}
    role-session-name: ftm-dev-s3
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}