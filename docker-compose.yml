services:
  backend:  # 서버 컨테이너
    image: ${IMAGE_FULL_PATH}
    container_name: ${DOCKERHUB_IMAGE_NAME}
    expose: # nginx 에서만 접근 가능하도록 expose 설정
      - "8080"
    volumes:
      - ./app-logs/errors:/logs # 서버 에러 경로 볼륨 마운트
    restart: always
    environment:
      - TZ=Asia/Seoul
    networks:
      - "ftm-network"
    env_file:  # 배포 환경 .env 파일 참조
      - .env

  redis:  # Redis 컨테이너
    image: "redis:alpine"
    container_name: redis
    ports:
      - "6379:6379"
    environment:
      - TZ=Asia/Seoul
    networks:
      - "ftm-network"

  nginx:  # Nginx 컨테이너
    image: "nginx:alpine"
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    restart: always
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    environment:
      - TZ=Asia/Seoul
    networks:
      - "ftm-network"
    depends_on:
      - backend
      - certbot

  certbot:  # certbot 컨테이너 (ssl/tls 인증서 자동 갱신 및 관리 도구)
    image: "certbot/certbot"
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet && nginx -s reload; sleep 12h & wait $${!}; done;'"

networks:
  ftm-network:
    driver: bridge